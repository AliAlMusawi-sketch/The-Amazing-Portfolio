<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Contact</title>
    <link rel="stylesheet" href="contact.css">
     <link rel="icon" type="png" href="lock.png">

</head>
<body>
    <div class="logo">
        <h1>The Amazing Portfolio</h1>
    </div>

    <div class="intro">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About me</a>
            <a href="project.html">Projects</a>
            <a href="cert.html">Certifications</a>
            <a href="award.html">Awards</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>

    <div class="page-title">
        <h2>Contact Me</h2>
    </div>

    <div class="contact-container">
        <div class="contact-flex">
            <!-- Social Section -->
            <div class="contact-info">
                <h3>Connect with me</h3>
                <p>Feel free to reach out for SOC Analyst opportunities or project collaborations.</p>
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/ali-al-musawi-8573a822b/" target="_blank" class="btn-social">LinkedIn</a>
                    <a href="mailto:ali.t.almusawi@gmail.com" class="btn-social">Email Me</a>
                </div>
            </div>

            <!-- Form Section -->
            <div class="contact-form-wrapper">
                <h3>Send a Message</h3>
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Name" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <textarea id="message" placeholder="Type your message here..." rows="5" required></textarea>
                    <button type="submit" class="btn-send">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <script src="contact.js"></script>
</body>
</html>
